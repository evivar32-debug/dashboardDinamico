<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Control - Login</title>
    <link rel="stylesheet" href="asset/style/menu.css"> <style>
        /* Estilos específicos para el centrado del Login */
        body {
            justify-content: center;
            align-items: center;
            background: #eceff1;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #03a9f4;
            text-align: center;
        }
        .login-card h1 {
            color: #263238;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .login-card p {
            color: #78909c;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #546e7a;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #03a9f4;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #263238;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #37474f;
        }
        #error-msg {
            color: #f44336;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Control de Telemetría</h1>
        <p>Ingrese sus credenciales industriales</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@planta.cl" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">INICIAR SESIÓN</button>
            <div id="error-msg">Credenciales incorrectas o error de conexión.</div>
        </form>
    </div>

    <script src="asset/js/login.js"></script>
</body>
</html>
